name: hygiene

# heso-skills ships markdown only — no clippy/ruff/knip — so its gates are the
# cross-cutting tracked-junk gate plus the markdown-repo analogue of the LINT
# gate: a SKILL.md structure check (frontmatter present · links resolve · no
# orphan references). Both are REAL merge-blocking gates (no report-only jobs).
#
# Convention: a job only goes RED when the work is actually broken — tracked junk
# got committed, or a SKILL.md lost its frontmatter / grew a dead link / orphaned
# a reference. Red always means "actually broken", never "baseline noise".

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Real gate: fails red if an ignored-class artifact is tracked.
  tracked-junk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { persist-credentials: false }
      - run: bash scripts/check-tracked-junk.sh

  # Real gate (STYLE/LINT for a markdown repo): SKILL.md structure must hold.
  skill-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { persist-credentials: false }
      - run: bash scripts/check-skill-structure.sh
