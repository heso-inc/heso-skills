name: hygiene

# heso-skills is markdown only — no code hygiene to capture (no clippy/ruff/knip),
# so there are no report-only findings jobs here. The one job is the tracked-junk
# gate, kept as a REAL gate so caches / .omc / OS noise can't creep into the repo.
#
# Convention: a job is GREEN when its tools RAN; a job only goes RED when the work
# is actually broken — for tracked-junk that means an ignored-class artifact got
# committed. Red always means "actually broken", never "baseline noise".

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Real gate (not report-only): fails red if an ignored-class artifact is tracked.
  tracked-junk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { persist-credentials: false }
      - run: bash scripts/check-tracked-junk.sh
